<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .p1 {
        border-style: solid;
        border-color: rgb(89, 255, 0);

    }
    .p2 {
        border-style: dashed;
        border-color:  rgb(58, 128, 0);

    }
    .p3 {
        border-style: dotted;
        border-color: black;
    }
    </style>

</head>
<body>
    <p class="p1">this is paragraph one</p>
    <p class="p2">this is paragraph two</p>
    <p class="p3">this is paragraph three</p>

</body>
</html>
